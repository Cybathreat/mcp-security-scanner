name: MCP Security Scanner CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run security scan daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Type of scan to run'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - auth-only
          - sandbox-only
          - quick

env:
  PYTHON_VERSION: '3.12'
  PIP_CACHE_DIR: ${{ github.workspace }}/.pip-cache

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.PIP_CACHE_DIR }}
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      
      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=html
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-mcp-scanner
          fail_ci_if_error: false
      
      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run MCP Security Scanner (self-scan)
        run: |
          # Create a test config for self-scanning
          cat > test-mcp-config.yaml << 'EOF'
          authentication:
            enabled: true
            token_algorithm: "HS256"
            secret: "${TEST_SECRET}"
          
          rate_limiting:
            enabled: true
            requests_per_minute: 100
          
          tools:
            - name: "test_tool"
              type: "shell"
              requires_auth: true
              sandbox:
                enabled: true
                timeout_seconds: 60
          EOF
          
          # Run the scanner
          python src/cli.py scan test-mcp-config.yaml --output both --output-dir ./scan-reports || true
      
      - name: Upload scan reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-reports
          path: scan-reports/
          retention-days: 30
      
      - name: Check for critical findings
        run: |
          if [ -f scan-reports/scan_result.json ]; then
            CRITICAL=$(python -c "import json; d=json.load(open('scan-reports/scan_result.json')); print(d.get('summary', {}).get('critical', 0))")
            if [ "$CRITICAL" -gt 0 ]; then
              echo "::warning::Found $CRITICAL critical security issues in test config"
            fi
          fi

  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install linters
        run: |
          pip install flake8 black mypy isort pylint
      
      - name: Run flake8
        run: |
          flake8 src/ tests/ --max-line-length=120 --ignore=E501,W503
      
      - name: Run black (check only)
        run: |
          black --check src/ tests/
      
      - name: Run isort (check only)
        run: |
          isort --check-only src/ tests/
      
      - name: Run mypy
        run: |
          mypy src/ --ignore-missing-imports --disable-error-code=annotation-unchecked || true
      
      - name: Run pylint
        run: |
          pylint src/ --disable=C0114,C0115,C0116,R0903 --max-line-length=120 || true

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [test, security-scan, lint, build]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Generate changelog
        run: |
          git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 HEAD^)..HEAD > CHANGELOG.md
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: CHANGELOG.md
          files: |
            LICENSE
            README.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
